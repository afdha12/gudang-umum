services:
    app_gu:
        container_name: app_gu
        image: laravel_app_gu
        restart: unless-stopped
        build:
            context: .
            # dockerfile: worker.dockerfile
        ports:
            - "8001:8001"
        # volumes:
        #   - .:/app
        env_file:
            - .env.prod
        networks:
            - docker_appnet

networks:
    docker_appnet:
        external: true # ← karena jaringan sudah dibuat di luar compose
